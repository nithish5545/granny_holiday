{% extends "base.html" %}

{% block title %}Admin Login — Tour Planner{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" style="border-top: 4px solid var(--accent);">
        <h2>⚙️ Admin Portal</h2>
        <p class="subtitle">Sign in to manage destinations and user trips</p>

        <form method="POST">
            <input type="email" name="email" placeholder="Admin Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Access Secure Area</button>
        </form>

        <p class="auth-link">
            Not an administrator? <a href="/login">Return to User Login</a>
        </p>
    </div>
</div>
{% endblock %}
