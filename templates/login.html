{% extends "base.html" %}

{% block title %}Login — Tour Planner{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to plan your next adventure</p>

        <form method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <p class="auth-link">
            Don't have an account? <a href="/register">Create one</a>
        </p>

        <p class="auth-link" style="margin-top: 10px; font-size: 0.85rem;">
            <a href="/admin/login" style="color: var(--text-muted);">Admin Portal</a>
        </p>
    </div>
</div>
{% endblock %}
